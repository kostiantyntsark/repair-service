<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Ремонт Техніки</title>
</head>
<body>
<nav>
    <a href="{% url 'service_list' %}">Послуги</a> |
    <a href="{% url 'contacts' %}">Контакти</a> |
    {% if user.is_authenticated %}
        <a href="{% url 'device_list' %}">Мої пристрої</a> |
        <a href="{% url 'order_list' %}">Мої замовлення</a> |
        <form method="post" action="{% url 'logout' %}" style="display:inline">
            {% csrf_token %}
            <button type="submit">Вийти ({{ user.username }})</button>
        </form>
    {% else %}
        <a href="{% url 'login' %}">Увійти</a> |
        <a href="{% url 'register' %}">Реєстрація</a>
    {% endif %}
</nav>
<hr>
{% block content %}{% endblock %}
</body>
</html>
